                <div className="p-8 bg-white/5 border border-white/5 rounded-xl hover:border-mvp-gold/30 transition-colors group">
                  <div className="text-4xl font-serif text-mvp-gold mb-4 opacity-50 group-hover:opacity-100">03</div>
                  <h3 className="text-xl font-bold text-white mb-3">社群連結</h3>
                  <p className="text-gray-400 text-sm leading-relaxed">加入 MVP 經理人專屬社群，參與跨界交流活動，與歷屆得主建立深厚連結。</p>
                </div>
              </div>
              <SectionTitle title="報名須知" subtitle="INFORMATION" />
              <div className="max-w-4xl mx-auto bg-mvp-charcoal border border-white/5 rounded-2xl p-8 md:p-12 mb-24">
                <div className="flex flex-col md:flex-row gap-12 items-center">
                  <div className="flex-1 space-y-6">
                    <h3 className="text-2xl font-bold text-white">準備資料</h3>
                    <ul className="space-y-4">
                      <li className="flex items-start gap-3 text-gray-400"><CheckCircle className="text-mvp-gold shrink-0 mt-1" size={18} /><span>基本個人與公司資料</span></li>
                      <li className="flex items-start gap-3 text-gray-400"><CheckCircle className="text-mvp-gold shrink-0 mt-1" size={18} /><span>一句話績效亮點 (30字內)</span></li>
                      <li className="flex items-start gap-3 text-gray-400"><CheckCircle className="text-mvp-gold shrink-0 mt-1" size={18} /><span>PDCA 核心事蹟</span></li>
                    </ul>
                  </div>
                  <div className="w-full md:w-auto bg-white/5 p-8 rounded-xl text-center border border-white/10">
                    <p className="text-gray-400 text-sm mb-2">報名費用</p>
                    <div className="text-4xl font-serif text-mvp-gold mb-6">NT$ 6,000</div>
                    <button onClick={() => setStep('payment')} className="w-full bg-mvp-gold hover:bg-yellow-500 text-black font-bold py-3 px-8 rounded-lg transition-colors tracking-widest shadow-glow-gold flex items-center justify-center gap-2">前往繳費 <ArrowRight size={18} /></button>
                    <button onClick={() => setStep('form')} className="text-xs text-gray-600 underline hover:text-mvp-gold mt-2 transition-colors">(模擬測試) 已繳費，直接填寫資料</button>
                  </div>
                </div>
              </div>
              <SectionTitle title="常見問題" subtitle="FAQ" />
              <div className="max-w-3xl mx-auto space-y-4">
                {FAQ_ITEMS.map((item, idx) => (
                  <div key={idx} className="border border-white/10 rounded-lg overflow-hidden bg-white/5">
                    <button onClick={() => toggleFaq(idx)} className="w-full flex justify-between items-center p-6 text-left hover:bg-white/5 transition-colors">
                      <span className="font-bold text-white">{item.q}</span>
                      {openFaq === idx ? <ChevronUp className="text-mvp-gold" /> : <ChevronDown className="text-gray-500" />}
                    </button>
                    {openFaq === idx && <div className="p-6 pt-0 text-gray-400 text-sm leading-relaxed border-t border-white/5 mt-2">{item.a}</div>}
                  </div>
                ))}
              </div>
            </div>
          )}
          {step === 'payment' && (
            <div className="max-w-2xl mx-auto px-6 text-center animate-fade-in">
              <div className="mb-8">
                <div className="w-20 h-20 bg-mvp-gold/20 rounded-full flex items-center justify-center text-mvp-gold mx-auto mb-6"><CreditCard size={40} /></div>
                <h2 className="text-3xl font-serif text-white mb-4">繳費確認</h2>
                <p className="text-gray-400">請確認以下資訊並完成繳費。</p>
              </div>
              <div className="bg-mvp-charcoal border border-white/5 rounded-2xl p-8 mb-8 text-left">
                <div className="flex justify-between items-center mb-4 pb-4 border-b border-white/10"><span className="text-gray-400">項目</span><span className="text-white font-bold">2026 100MVP 經理人報名費</span></div>
                <div className="flex justify-between items-center mb-4"><span className="text-gray-400">金額</span><span className="text-2xl font-serif text-mvp-gold">NT$ 6,000</span></div>
              </div>
              <div className="flex gap-4">
                <button onClick={() => setStep('info')} className="flex-1 border border-white/20 text-white py-4 rounded-lg hover:bg-white/10 transition-colors">返回</button>
                <button onClick={() => setStep('form')} className="flex-1 bg-mvp-gold text-black font-bold py-4 rounded-lg hover:bg-yellow-500 transition-colors shadow-glow-gold">確認付款</button>
              </div>
            </div>
          )}
          {step === 'form' && (
            <div className="max-w-4xl mx-auto px-6 animate-fade-in">
              <div className="text-center mb-12">
                <div className="inline-flex items-center gap-2 text-green-500 bg-green-500/10 px-4 py-2 rounded-full mb-6 border border-green-500/20"><CheckCircle size={16} /><span className="text-sm font-bold">付款成功</span></div>
                <h2 className="text-4xl font-serif text-white mb-4">填寫報名資料</h2>
              </div>
              <div className="bg-mvp-charcoal border border-white/5 rounded-2xl p-8 md:p-12 shadow-2xl relative overflow-hidden">
                <div className="space-y-12">
                  <div>
                    <div className="flex items-center gap-4 mb-8 border-b border-white/10 pb-4"><div className="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-mvp-gold font-bold">01</div><h3 className="text-xl font-serif text-white">基本資料</h3></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="space-y-2"><label className="text-xs text-gray-400 uppercase tracking-wider">姓名 <span className="text-red-500">*</span></label><input type="text" className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-mvp-gold transition-colors" placeholder="請輸入姓名" /></div>
                      <div className="space-y-2"><label className="text-xs text-gray-400 uppercase tracking-wider">聯絡電話 <span className="text-red-500">*</span></label><input type="tel" className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-mvp-gold transition-colors" placeholder="請輸入聯絡電話" /></div>
                      <div className="space-y-2 md:col-span-2"><label className="text-xs text-gray-400 uppercase tracking-wider">Email <span className="text-red-500">*</span></label><input type="email" className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-mvp-gold transition-colors" placeholder="請輸入 Email" /></div>
                    </div>
                  </div>
                  <div className="pt-6"><button type="button" className="w-full bg-mvp-gold hover:bg-yellow-500 text-black font-bold py-4 rounded-lg transition-colors tracking-widest shadow-glow-gold">確認送出申請</button></div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const AboutPage = () => (
      <div className="pt-32 pb-20 min-h-screen bg-mvp-black animate-fade-in">
        <section className="max-w-7xl mx-auto px-6 mb-32">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
            <div>
              <h2 className="text-4xl md:text-6xl font-serif text-white mb-8 leading-tight">關於 <br /><span className="text-mvp-gold">100 MVP 經理人</span></h2>
              <div className="space-y-6 text-gray-400 leading-relaxed font-light">
                <p>自 2008 年起，《經理人月刊》每年舉辦「100 MVP 經理人」選拔，從各行各業中挖掘出 100 位在該年度展現卓越績效的專業經理人。</p>
                <p>MVP 代表的不僅是 Most Valuable Player，更是 Manager, Visionary, Professional。</p>
              </div>
            </div>
            <div className="relative">
              <div className="absolute inset-0 bg-mvp-gold/10 transform translate-x-4 translate-y-4 border border-mvp-gold/20"></div>
              <img src="https://picsum.photos/800/600?grayscale" alt="About 100 MVP" className="relative z-10 w-full h-auto grayscale hover:grayscale-0 transition-all duration-700 shadow-2xl" />
            </div>
          </div>
        </section>
      </div>
    );

    const HallOfFamePage = () => {
      const [selectedYear, setSelectedYear] = useState(2025);
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedManager, setSelectedManager] = useState(null);

      const years = useMemo(() => Array.from(new Set(MOCK_MANAGERS.map(m => m.year))).sort((a, b) => b - a).filter(y => y < 2026), []);
      const filteredManagers = useMemo(() => MOCK_MANAGERS.filter(m => m.year === selectedYear && (m.name.includes(searchTerm) || m.company.includes(searchTerm))), [selectedYear, searchTerm]);
      const managersByCategory = useMemo(() => {
        const grouped = {};
        CATEGORIES_DESC.forEach(cat => grouped[cat.type] = filteredManagers.filter(m => m.category === cat.type));
        return grouped;
      }, [filteredManagers]);

      return (
        <div className="min-h-screen bg-mvp-black pt-24 pb-20">
          <div className="max-w-7xl mx-auto px-6">
            <div className="text-center mb-16"><h1 className="text-4xl md:text-5xl font-serif font-bold text-white mb-4">歷屆得主</h1></div>
            <div className="flex flex-col md:flex-row justify-between items-center gap-6 mb-12 sticky top-20 z-30 bg-mvp-black/95 backdrop-blur py-4 border-b border-white/10">
              <div className="flex gap-2 overflow-x-auto w-full md:w-auto pb-2 md:pb-0 no-scrollbar">
                {years.map(year => (
                  <button key={year} onClick={() => setSelectedYear(year)} className={`px-6 py-2 rounded-full text-sm font-medium transition-all whitespace-nowrap ${selectedYear === year ? 'bg-mvp-gold text-black shadow-glow-gold' : 'bg-white/5 text-gray-400 hover:bg-white/10 hover:text-white'}`}>{year} MVP</button>
                ))}
              </div>
              <div className="relative w-full md:w-64">
                <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" />
                <input type="text" placeholder="搜尋姓名、公司..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-full pl-10 pr-4 py-2 text-sm text-white focus:outline-none focus:border-mvp-gold transition-colors" />
              </div>
            </div>
            <div className="space-y-16">
              {CATEGORIES_DESC.map(category => {
                const managers = managersByCategory[category.type];
                if (!managers || managers.length === 0) return null;
                return (
                  <div key={category.type} className="animate-fade-in">
                    <div className="flex items-center gap-4 mb-8"><div className="h-8 w-1 bg-mvp-gold rounded-full"></div><h2 className="text-2xl font-bold text-white">{category.title}</h2></div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                      {managers.map(manager => (
                        <div key={manager.id} onClick={() => setSelectedManager(manager)} className="group bg-white/5 border border-white/10 p-5 rounded-xl cursor-pointer hover:bg-white/10 hover:border-mvp-gold/50 transition-all duration-300 relative overflow-hidden">
                          <div className="flex justify-between items-start mb-3"><h3 className="text-xl font-bold text-white group-hover:text-mvp-gold transition-colors">{manager.name}</h3></div>
                          <div className="space-y-1"><p className="text-sm text-gray-300 font-medium truncate">{manager.company}</p><p className="text-xs text-gray-500 truncate">{manager.title}</p></div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          {selectedManager && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setSelectedManager(null)}></div>
              <div className="relative bg-[#1a1a1a] border border-white/10 rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto shadow-2xl animate-slide-up p-8">
                <button onClick={() => setSelectedManager(null)} className="absolute top-4 right-4 p-2 text-gray-400 hover:text-white bg-black/20 hover:bg-black/40 rounded-full transition-colors z-10"><X className="w-5 h-5" /></button>
                <h2 className="text-3xl font-bold text-white mb-2">{selectedManager.name}</h2>
                <p className="text-gray-300 leading-relaxed">{selectedManager.shortPerformance}</p>
              </div>
            </div>
          )}
        </div>
      );
    };

    const AdminPage = () => (
      <div className="pt-32 pb-20 min-h-screen bg-mvp-black animate-fade-in">
        <div className="max-w-7xl mx-auto px-6">
          <div className="flex justify-between items-center mb-12"><h2 className="text-3xl font-serif text-white">後台管理系統</h2></div>
          <div className="bg-mvp-charcoal border border-white/5 rounded-xl overflow-hidden shadow-2xl">
            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse">
                <thead>
                  <tr className="bg-white/5 border-b border-white/10">
                    <th className="p-4 text-xs font-bold text-gray-400 uppercase tracking-wider">ID</th>
                    <th className="p-4 text-xs font-bold text-gray-400 uppercase tracking-wider">姓名</th>
                    <th className="p-4 text-xs font-bold text-gray-400 uppercase tracking-wider">公司/職稱</th>
                    <th className="p-4 text-xs font-bold text-gray-400 uppercase tracking-wider">繳費狀態</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-white/5">
                  {MOCK_MANAGERS.filter(m => m.year === 2026).map(manager => (
                    <tr key={manager.id} className="hover:bg-white/5 transition-colors">
                      <td className="p-4 text-gray-500 font-mono">#{manager.id}</td>
                      <td className="p-4 text-white font-medium">{manager.name}</td>
                      <td className="p-4 text-gray-400"><div className="text-white">{manager.company}</div><div className="text-xs">{manager.title}</div></td>
                      <td className="p-4">{manager.paid ? <span className="text-green-500 text-xs font-bold">已繳費</span> : <span className="text-red-500 text-xs font-bold">未繳費</span>}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    );

    const App = () => {
      const [activePage, setActivePage] = useState('home');

      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash.replace('#', '');
          if (['home', 'apply', 'about', 'hall', 'admin'].includes(hash)) {
            setActivePage(hash);
          } else {
            setActivePage('home');
          }
        };
        handleHashChange();
        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      const setPage = (page) => {
        setActivePage(page);
        window.location.hash = page;
      };

      const renderPage = () => {
        switch (activePage) {
          case 'home': return <HomePage setPage={setPage} />;
          case 'apply': return <ApplyPage setPage={setPage} />;
          case 'about': return <AboutPage />;
          case 'hall': return <HallOfFamePage />;
          case 'admin': return <AdminPage />;
          default: return <HomePage setPage={setPage} />;
        }
      };

      return (
        <div className="min-h-screen bg-mvp-black text-white font-sans selection:bg-mvp-gold selection:text-black flex flex-col">
          <Navbar activePage={activePage} setPage={setPage} />
          <main className="flex-grow">{renderPage()}</main>
          <Footer />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
